{% load static %}
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BOOKS.</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="{% static 'style.css' %}">
</head>
<body>
<nav class="navbar navbar-expand-lg custom-navbar sticky-top">
    <div class="container">
        <a class="navbar-brand" href="/">LIVROS<span style="color: #737372;">.</span></a>
        
        <button class="navbar-toggler border-0 p-0" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <div class="book-icon">
                <span></span>
                <span></span>
                <span></span>
            </div>
        </button>

        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav me-auto">
                <li class="nav-item">
                    <a class="nav-link" href="">Explorar</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="">Coleções</a>
                </li>
            </ul>

            <form class="search-container" id="search-form">
                <input id="search-input" class="form-control search-input" type="search" placeholder="Buscar..." autocomplete="off">
                <button class="btn btn-search" type="submit">VAI</button>
            </form>
        </div>
    </div>
</nav>

    <main class="container mt-5">
        
        {% block content %}
        {% endblock %}
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
document.addEventListener('DOMContentLoaded', function() {
    const searchInput = document.getElementById('search-input');
    const resultsContainer = document.getElementById('book-results');
    const filterForm = document.getElementById('filterForm');

    // Função que reduz a fonte conforme o tamanho do texto (Apenas PC)
    function ajustarFontePC() {
        const labelPC = document.querySelector('.breadcrumb-label.d-none.d-md-inline');
        if (!labelPC) return;

        const texto = labelPC.innerText;
        const tamanhoTexto = texto.length;

        let novoTamanho = 1.1; // Tamanho base que você usa

        if (tamanhoTexto > 100) {
            novoTamanho = 0.7;
        } else if (tamanhoTexto > 70) {
            novoTamanho = 0.8;
        } else if (tamanhoTexto > 40) {
            novoTamanho = 0.9;
        }

        labelPC.style.fontSize = novoTamanho + "rem";
    }

    // Executa a escala assim que a página carrega
    ajustarFontePC();
    if (searchInput) {
        searchInput.addEventListener('input', function() {
            const query = this.value;
            const formData = new FormData(filterForm);
            const params = new URLSearchParams(formData);
            
            params.set('q', query);

            const url = `/?${params.toString()}`;

            fetch(url, {
                headers: {
                    'X-Requested-With': 'XMLHttpRequest'
                }
            })
            .then(response => response.text())
            .then(html => {
                const parser = new DOMParser();
                const doc = parser.parseFromString(html, 'text/html');
                const newResults = doc.getElementById('book-results');
                
                if (newResults && resultsContainer) {
                    resultsContainer.innerHTML = newResults.innerHTML;
                    // Re-executa a escala após atualizar os resultados via AJAX
                    ajustarFontePC();
                }
            })
            .catch(error => console.error('Erro na busca filtrada:', error));
        });
    }
});
</script>
</body>
</html>
