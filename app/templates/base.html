{% load static %}
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BOOKS.</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'style.css' %}">
</head>
<body>

        <a class="navbar-brand" href="/">LIVROS<span style="color: #737372;">.</span></a>
        
        <button class="navbar-toggler border-0 p-0" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">

                <span></span>
                <span></span>
                <span></span>
            </div>
        </button>

        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav me-auto">
                <li class="nav-item">
                    <a class="nav-link" href="">Explorar</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="">Coleções</a>
                </li>
            </ul>

            <form class="search-container" role="search">
                <input class="form-control search-input" type="search" placeholder="Buscar...">
                <button class="btn btn-search" type="submit">VAI</button>
            </form>
        </div>
    </div>
</nav>

    <main class="container mt-5">
        
        {% block content %}
        {% endblock %}

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</html>
