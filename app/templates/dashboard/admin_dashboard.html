{% extends 'base.html' %}

{% if user.is_authenticated %}
{% block content %}
<div class="container mt-5">
    <div class="d-flex justify-content-between align-items-center mb-5">
        <div>
            <h2 class="fw-bold mb-0">Painel de Controle</h2>
        </div>
        <a href="{% url 'add_livro' %}" class="btn-add-new">
            <i class="bi bi-plus-lg"></i> NOVO LIVRO
        </a>
    </div>

    <div class="row row-cols-2 row-cols-md-4 row-cols-lg-5 g-4">
        {% for livro in livros %}
        <div class="col">
            <div class="admin-book-card">
                <div class="admin-card-img">
                    <img src="{{ livro.capa.url }}" alt="{{ livro.titulo }}">
                    
                    <div class="admin-sold-control">
                        <label class="sold-label">
                            <input type="checkbox" 
                                name="vendido" 
                                class="sold-checkbox"
                                data-book-id="{{ livro.id }}"
                                {% if livro.vendido %}checked{% endif %}>
                            <span>Vendido</span>
                        </label>
                    </div>

                    <div class="admin-overlay">
                        <a href="{% url 'edit_livro' livro.id %}" class="btn-edit">
                            <i class="bi bi-pencil-square"></i>
                        </a>
                    </div>
                </div>
                <div class="admin-card-info p-2 text-center">
                    <h6 class="text-truncate mb-1">{{ livro.titulo }}</h6>
                    <span class="admin-price">R$ {{ livro.preco }}</span>
                </div>
            </div>
        </div>
        {% endfor %}
    </div>
</div>
<script>
    // Script do botão de vendas
    document.querySelectorAll('.sold-checkbox').forEach(check => {
    check.addEventListener('change', function() {
        const bookId = this.dataset.bookId;
        const status = this.checked;

        fetch(`/update-book-status/${bookId}/`, {
            method: 'POST',
            headers: {
                'X-CSRFToken': '{{ csrf_token }}',
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({ 'vendido': status })
        });
    });
});
</script>
{% endblock %}
{% else %}
    <script>window.location.href = "/404-not-found/";</script>
{% endif %}
